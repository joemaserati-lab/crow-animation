<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Crow scroll animation ottimizzata: canvas frame sequence con fallback video e qualità adattiva." />
  <title>Crow Scroll Animation – Optimized Deploy</title>

  <!-- Deploy note: gli asset sono caricati dal repository originale via script[data-asset-base].
       Per un deploy self-hosted copia frames/, frames-mobile-portrait/ e mp4 in questa cartella
       e imposta data-asset-base="" sullo script in fondo alla pagina. -->
  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app" aria-label="Animazione controllata dallo scroll">
    <section class="scrub-stage" id="scrubStage">
      <canvas id="frameCanvas" class="frame-canvas" aria-hidden="true"></canvas>

      <video
        id="scrollVideoFallback"
        class="scroll-video-fallback"
        data-src="crow-threshold-scrub.mp4"
        muted
        playsinline
        preload="metadata"
        crossorigin="anonymous"
        aria-hidden="true"
      ></video>

      <div class="depth-layer" aria-hidden="true"></div>
      <div class="frame-overlay black-frame" aria-hidden="true"></div>
      <div class="frame-overlay white-frame" aria-hidden="true"></div>
      <div class="film-grain" aria-hidden="true"></div>
      <div class="vignette" aria-hidden="true"></div>

      <div class="loader" id="loader" aria-live="polite">
        <span id="loaderText">Caricamento frame</span>
      </div>

      <div class="scroll-ui" aria-hidden="true">
        <div class="progress-track">
          <span id="progressBar" class="progress-bar"></span>
        </div>
        <span class="scroll-hint">Scroll</span>
      </div>
    </section>
  </main>

  <div class="mobile-scroll-spacer" aria-hidden="true"></div>

  <noscript>
    <style>
      .loader::after { content: "JavaScript richiesto per questa animazione."; }
    </style>
  </noscript>

  <script
    src="script.js"
    data-asset-base="https://raw.githubusercontent.com/joemaserati-lab/crow-animation/main/"
    defer
  ></script>
</body>
</html>
