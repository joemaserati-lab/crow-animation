name: Lighthouse smoke test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check:js
      - run: npx serve . -l 8080 &
      - run: sleep 3 && npm run lighthouse
